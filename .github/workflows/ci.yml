name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit | ${{ matrix.os }} | Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: allure-results/

  api-tests:
    name: API | ${{ matrix.os }} | Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Start server and wait
        shell: bash
        run: |
          npm start &
          npx wait-on http://localhost:3000
      - name: Run API tests
        run: npm run test:api
      - name: Upload api artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            allure-results/
            report.html

  ui-tests:
    name: UI | Ubuntu | Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: Start server and wait
        shell: bash
        run: |
          npm start &
          npx wait-on http://localhost:3000
      - name: Run UI tests
        run: npm run test:ui
      - name: Upload ui artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-node-${{ matrix.node-version }}
          path: |
            allure-results/
            playwright-report/
            test-results/

  allure-report:
    name: Build Allure report
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: Merge Allure results
        shell: bash
        run: |
          mkdir -p allure-results
          find all-artifacts -type f -path "*/allure-results/*" -exec cp {} allure-results/ \;
      - name: Generate Allure report
        run: npm run allure:generate
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

  notify:
    name: Telegram notify
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests, allure-report]
    if: always()
    steps:
      - name: Send telegram message
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@v1.0.1
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            CI Pipeline: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Unit: ${{ needs.unit-tests.result }}
            API: ${{ needs.api-tests.result }}
            UI: ${{ needs.ui-tests.result }}
            Allure: ${{ needs.allure-report.result }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
